<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Learning Journal</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/nav.css" />
    <link rel="stylesheet" href="css/footer.css" />
    <link rel="stylesheet" href="css/post-card.css" />
  </head>
  <body>
    <!-- =====================================================
       HEADER / NAV
       ===================================================== -->
    <header>
      <div class="nav-container">
        <a href="index.html" class="nav-logo">Exxeed's Blog</a>
        <nav>
          <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
          </ul>
        </nav>
        <button
          class="theme-toggle"
          aria-label="Toggle dark mode"
          title="Toggle dark mode"
        >
          <svg class="toggle-icon" viewBox="0 0 24 24" aria-hidden="true">
            <g
              class="sun-icon"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            >
              <circle cx="12" cy="12" r="4" />
              <line x1="12" y1="2" x2="12" y2="4" />
              <line x1="12" y1="20" x2="12" y2="22" />
              <line x1="2" y1="12" x2="4" y2="12" />
              <line x1="20" y1="12" x2="22" y2="12" />
              <line x1="4.93" y1="4.93" x2="6.34" y2="6.34" />
              <line x1="17.66" y1="17.66" x2="19.07" y2="19.07" />
              <line x1="19.07" y1="4.93" x2="17.66" y2="6.34" />
              <line x1="4.93" y1="19.07" x2="6.34" y2="17.66" />
            </g>
            <g
              class="moon-icon"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </g>
          </svg>
        </button>
        <button class="hamburger" aria-label="Open menu">☰</button>
      </div>
    </header>

    <main>
      <!-- =====================================================
         HERO SECTION
         ===================================================== -->
      <section class="hero">
        <img
          src="assets/images/soldiers-marching.jpg"
          alt="Soldiers in battle uniform marching"
        />
        <div class="hero-card">
          <span class="tag">Life</span>
          <h1>From Soldier in Training to Developer in Training</h1>
          <p>
            I traded my rifle for a keyboard and a cup of coffee. They didn't
            teach me these stuff in the Academy.
          </p>
          <a href="post.html?slug=traded-my-rifle-for-a-keyboard" clas="btn"
            >Read more</a
          >
        </div>
      </section>

      <!-- =====================================================
         POST GRID SECTION
         ===================================================== -->
      <section class="posts-section">
        <div class="posts-container">
          <input type="text" id="search" placeholder="Search posts..." />

          <!-- The post cards are injected here by js/main.js. Leave this div empty. -->
          <div id="posts-grid" class="posts-grid"></div>
          <button id="load-more" class="btn">Load more posts</button>
        </div>
      </section>
    </main>

    <!-- =====================================================
       FOOTER
       ===================================================== -->
    <footer>
      <div class="footer-container">
        <span class="nav-logo">My Journal</span>
        <p>© 2026 EXXEED</p>
      </div>
    </footer>

    <!-- Scripts loaded at end of <body> so the DOM is ready when they run -->
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
