<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Learning Journal</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/nav.css" />
    <link rel="stylesheet" href="css/footer.css" />
    <link rel="stylesheet" href="css/post-card.css" />
  </head>
  <body>
    <!-- =====================================================
       HEADER / NAV
       ===================================================== -->
    <header>
      <div class="nav-container">
        <a href="index.html" class="nav-logo">Exxeed's Blog</a>
        <nav>
          <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
          </ul>
        </nav>

        <!-- TODO 3 (STRETCH): Add a theme toggle button and hamburger icon.
           <button class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
           <button class="hamburger" aria-label="Open menu">☰</button>
           Wire these up in a shared js/theme.js file loaded on every page (see the theme toggle hints in js/about.js TODO 1), or add the logic directly to js/main.js for now.
      --></div>
    </header>

    <main>
      <!-- =====================================================
         HERO SECTION
         ===================================================== -->
      <section class="hero">
        <img
          src="assets/images/soldiers-marching.jpg"
          alt="Soldiers in battle uniform marching"
        />
        <div class="hero-card">
          <span class="tag">Life</span>
          <h1>From Soldier in Training to Developer in Training</h1>
          <p>
            I traded my rifle for a keyboard and a cup of coffee. They didn't
            teach me these stuff in the Academy.
          </p>
          <a href="post.html?slug=traded-my-rifle-for-a-keyboard" clas="btn"
            >Read more</a
          >
        </div>
      </section>

      <!-- =====================================================
         POST GRID SECTION
         ===================================================== -->
      <section class="posts-section">
        <div class="posts-container">
          <!-- TODO 6 (STRETCH): Add a search/filter input above the grid.
             <input type="text" id="search" placeholder="Search posts..." />
             The filter logic is in js/main.js (TODO 4 in that file).
        -->
          <input type="text" id="search" placeholder="Search posts..." />

          <!-- The post cards are injected here by js/main.js. Leave this div empty. -->
          <div id="posts-grid" class="posts-grid"></div>

          <!-- TODO 7 (STRETCH): Add a "Load more" button below the grid.
             <button id="load-more" class="btn">Load more posts</button>
             The pagination logic is in js/main.js (TODO 5 in that file).
        -->
          <button id="load-more" class="btn">Load more posts</button>
        </div>
      </section>
    </main>

    <!-- =====================================================
       FOOTER
       ===================================================== -->
    <footer>
      <div class="footer-container">
        <span class="nav-logo">My Journal</span>
        <p>© 2026 EXXEED</p>
      </div>
    </footer>

    <!-- Scripts loaded at end of <body> so the DOM is ready when they run -->
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
